<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Full-Stack Interview Prep — Smit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--bg-s:#17171a;--bg-c:#1c1c20;--bg-h:#242428;
  --txt:#e8e6e1;--txt-s:#9b9896;--txt-h:#5a5856;
  --brd:rgba(255,255,255,0.07);--brd-s:rgba(255,255,255,0.14);
  --acc:#6366f1;--acc-bg:rgba(99,102,241,0.15);--acc-txt:#a5b4fc;
  --ok:#22c55e;--ok-bg:rgba(34,197,94,0.1);--ok-txt:#86efac;
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,0.1);--warn-txt:#fcd34d;
  --danger:#ef4444;--dbg:rgba(239,68,68,0.1);--dtxt:#fca5a5;
  --teal-bg:rgba(20,184,166,0.12);--teal-txt:#5eead4;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --tw:64px;--sw:218px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;line-height:1.6;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh;overflow:hidden}

/* TAB RAIL */
.tab-rail{width:var(--tw);flex-shrink:0;background:var(--bg-s);border-right:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;overflow-y:auto}
.tab-btn{width:50px;height:52px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:transparent;transition:background .15s;position:relative;flex-shrink:0;padding:0}
.tab-btn:hover{background:var(--bg-h)}.tab-btn.active{background:var(--acc-bg)}.tab-btn.setup-active{background:var(--teal-bg)!important}.tab-btn.setup-active::before{background:var(--teal-txt)!important}.tab-btn.setup-active .tab-lbl{color:var(--teal-txt)!important}
.tab-btn.active::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:3px;height:26px;background:var(--acc);border-radius:0 3px 3px 0}
.tab-icon{width:22px;height:22px;flex-shrink:0}.tab-lbl{font-size:9px;color:var(--txt-h);font-weight:500;letter-spacing:.02em;line-height:1;text-align:center}.tab-btn.active .tab-lbl{color:var(--acc-txt)}.tab-sep{width:30px;height:1px;background:var(--brd);margin:2px 0;flex-shrink:0}

/* SIDEBAR */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg-s);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:10px 10px 8px;border-bottom:1px solid var(--brd);flex-shrink:0}
.sb-grp{font-size:10px;font-weight:600;color:var(--txt-s);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.sb-search-wrap{position:relative}
.sb-si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt-h);pointer-events:none;display:flex}
.sb-input{width:100%;padding:6px 9px 6px 28px;border-radius:7px;border:1px solid var(--brd);background:var(--bg-c);font-family:var(--font);font-size:12px;color:var(--txt);outline:none}
.sb-input:focus{border-color:var(--acc);background:var(--bg-h)}
.sb-list{flex:1;overflow-y:auto;padding:5px}
.tp-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:8px;background:transparent;border:none;cursor:pointer;font-family:var(--font);font-size:12.5px;color:var(--txt-s);text-align:left;transition:background .1s,color .1s;margin-bottom:1px}
.tp-btn:hover{background:var(--bg-h);color:var(--txt)}.tp-btn.active{background:var(--acc-bg);color:var(--acc-txt);font-weight:500}.tp-btn.setup-tp.active{background:var(--teal-bg)!important;color:var(--teal-txt)!important}.tp-btn.setup-tp.active .tp-qn{background:rgba(20,184,166,0.2)!important;color:var(--teal-txt)!important}
.tp-ico{width:18px;height:18px;flex-shrink:0;border-radius:4px;overflow:hidden}
.tp-qn{margin-left:auto;font-size:10px;color:var(--txt-h);background:var(--bg-h);padding:1px 6px;border-radius:7px;flex-shrink:0}.tp-btn.active .tp-qn{background:rgba(99,102,241,0.25);color:var(--acc-txt)}

/* PANEL */
.panel{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg-s);border-bottom:1px solid var(--brd);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:48px;flex-wrap:nowrap}
.tb-ico{width:20px;height:20px;border-radius:4px;overflow:hidden;flex-shrink:0}
.tb-info{display:flex;flex-direction:column;min-width:0;flex-shrink:1}
.tb-title{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-desc{font-size:10px;color:var(--txt-s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.gswrap{position:relative;display:flex;align-items:center}
.gsicon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt-h);pointer-events:none;display:flex}
.gsearch{padding:5px 26px 5px 28px;border-radius:7px;border:1px solid var(--brd);background:var(--bg-c);font-family:var(--font);font-size:12px;color:var(--txt);outline:none;width:160px;transition:width .2s,border-color .15s}
.gsearch:focus{border-color:var(--acc);width:210px;background:var(--bg-h)}
.gsclear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--txt-h);cursor:pointer;display:none;font-size:12px;line-height:1;padding:2px 3px;border-radius:3px}.gsclear.show{display:flex;align-items:center}.gsclear:hover{color:var(--txt)}
.fgrp{display:flex;gap:3px}
.fb{padding:4px 8px;border-radius:6px;border:1px solid var(--brd);background:transparent;color:var(--txt-s);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .12s;white-space:nowrap}
.fb:hover{background:var(--bg-h);color:var(--txt)}
.fb.on.fa{background:var(--bg-h);color:var(--txt);border-color:var(--brd-s)}
.fb.on.fc{background:var(--ok-bg);color:var(--ok-txt);border-color:rgba(34,197,94,.3)}
.fb.on.fm{background:var(--warn-bg);color:var(--warn-txt);border-color:rgba(245,158,11,.3)}
.fb.on.fs{background:var(--dbg);color:var(--dtxt);border-color:rgba(239,68,68,.3)}
.tb-stat{font-size:11px;color:var(--txt-h);white-space:nowrap}.tb-stat b{color:var(--txt-s);font-weight:600}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px 20px 60px}
.gsearch-panel{flex:1;overflow-y:auto;padding:16px 20px 60px;display:none}.gsearch-panel.show{display:block}
.st-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.st-box{background:var(--bg-c);border:1px solid var(--brd);border-radius:8px;padding:9px 12px}
.st-val{font-size:20px;font-weight:700;color:var(--txt);margin-bottom:1px}.st-lbl{font-size:11px;color:var(--txt-h)}
.s-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--brd)}
.s-hdr-ico{width:22px;height:22px;border-radius:5px;overflow:hidden;flex-shrink:0}
.s-hdr-info h2{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:1px}.s-hdr-info p{font-size:11px;color:var(--txt-s)}
.s-actions{margin-left:auto;display:flex;gap:5px;flex-shrink:0}
.sa{padding:3px 9px;border-radius:6px;border:1px solid var(--brd);background:transparent;color:var(--txt-s);cursor:pointer;font-size:11px;font-family:var(--font);transition:background .1s}.sa:hover{background:var(--bg-h)}

/* Q CARDS */
.q-card{background:var(--bg-c);border:1px solid var(--brd);border-radius:9px;margin-bottom:5px;overflow:hidden;transition:border-color .15s}
.q-card:hover{border-color:var(--brd-s)}.q-card.open{border-color:rgba(99,102,241,.45)}
.q-trig{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;cursor:pointer;width:100%;background:transparent;border:none;font-family:var(--font);text-align:left}
.q-trig:hover{background:rgba(255,255,255,.02)}
.q-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;margin-top:1px}
.q-num{width:22px;height:22px;border-radius:50%;background:var(--bg-h);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--txt-h)}
.badge{font-size:9px;padding:2px 5px;border-radius:5px;white-space:nowrap;font-weight:600;letter-spacing:.02em}
.bc{background:var(--ok-bg);color:var(--ok-txt)}.bm{background:var(--warn-bg);color:var(--warn-txt)}.bs{background:var(--dbg);color:var(--dtxt)}.binfo{background:var(--teal-bg);color:var(--teal-txt)}
.q-text{flex:1;font-size:13px;font-weight:500;color:var(--txt);line-height:1.5}
.q-chev{flex-shrink:0;width:14px;height:14px;margin-top:3px;color:var(--txt-h);transition:transform .2s}.q-card.open .q-chev{transform:rotate(180deg)}
.q-ans{display:none;padding:9px 13px 13px 44px;border-top:1px solid var(--brd)}.q-card.open .q-ans{display:block}
.q-ans p{font-size:12.5px;color:var(--txt-s);line-height:1.75;margin-bottom:6px}.q-ans p:last-child{margin-bottom:0}
.q-ans strong{font-weight:600;color:var(--txt)}
.q-ans code{font-family:var(--mono);font-size:11px;background:var(--bg-h);padding:1px 5px;border-radius:4px;color:#a5b4fc;border:1px solid var(--brd)}
.q-ans pre{font-family:var(--mono);font-size:11.5px;background:var(--bg);padding:11px 13px;border-radius:8px;overflow-x:auto;line-height:1.65;color:#e2e8f0;margin:.45rem 0;border:1px solid var(--brd)}
.q-ans ul,.q-ans ol{font-size:12.5px;color:var(--txt-s);line-height:1.75;padding-left:1.2rem;margin-bottom:6px}.q-ans li{margin-bottom:2px}
.q-ans table{width:100%;border-collapse:collapse;font-size:11.5px;margin:.45rem 0}
.q-ans th{background:var(--bg-h);color:var(--txt-s);font-weight:600;padding:5px 9px;text-align:left;border:1px solid var(--brd)}
.q-ans td{padding:5px 9px;border:1px solid var(--brd);color:var(--txt-s);vertical-align:top}

/* STEP CARDS */
.step-card{background:var(--bg-c);border:1px solid var(--brd);border-radius:9px;margin-bottom:5px;overflow:hidden;transition:border-color .15s}
.step-card:hover{border-color:var(--brd-s)}.step-card.open{border-color:rgba(20,184,166,.4)}
.step-trig{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;cursor:pointer;width:100%;background:transparent;border:none;font-family:var(--font);text-align:left}
.step-trig:hover{background:rgba(255,255,255,.02)}
.step-num{width:22px;height:22px;border-radius:6px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--teal-txt);flex-shrink:0;margin-top:1px}
.step-text{flex:1;font-size:13px;font-weight:500;color:var(--txt);line-height:1.5}
.step-chev{flex-shrink:0;width:14px;height:14px;margin-top:3px;color:var(--txt-h);transition:transform .2s}.step-card.open .step-chev{transform:rotate(180deg)}
.step-ans{display:none;padding:9px 13px 13px 44px;border-top:1px solid var(--brd)}.step-card.open .step-ans{display:block}
.step-ans p{font-size:12.5px;color:var(--txt-s);line-height:1.75;margin-bottom:6px}
.step-ans pre{font-family:var(--mono);font-size:11.5px;background:var(--bg);padding:11px 13px;border-radius:8px;overflow-x:auto;line-height:1.65;color:#e2e8f0;margin:.45rem 0;border:1px solid var(--brd)}
.step-ans code{font-family:var(--mono);font-size:11px;background:var(--bg-h);padding:1px 5px;border-radius:4px;color:var(--teal-txt);border:1px solid var(--brd)}

/* GLOBAL SEARCH */
.gs-result{background:var(--bg-c);border:1px solid var(--brd);border-radius:9px;margin-bottom:6px;overflow:hidden}
.gs-r-hdr{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--brd);background:var(--bg-h)}
.gs-r-hdr span{font-size:11px;font-weight:600;color:var(--txt-h)}
.gs-r-hdr .gs-topic{font-size:11px;color:var(--acc-txt);font-weight:500}
.gs-r-body{padding:10px 12px}
.gs-r-q{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:6px;cursor:pointer;line-height:1.4}
.gs-r-q:hover{color:var(--acc-txt)}
.gs-r-ans{font-size:12px;color:var(--txt-s);line-height:1.6}
.gs-r-ans p{margin-bottom:4px;font-size:12px;color:var(--txt-s)}
.gs-r-ans code{font-family:var(--mono);font-size:10.5px;background:var(--bg-h);padding:1px 4px;border-radius:3px;color:#a5b4fc}
.gs-r-ans pre{font-family:var(--mono);font-size:10.5px;background:var(--bg);padding:8px;border-radius:6px;overflow-x:auto;color:#e2e8f0;margin:.3rem 0;border:1px solid var(--brd)}
.gs-empty{padding:40px;text-align:center;color:var(--txt-h);font-size:14px}
.gs-count{font-size:12px;color:var(--txt-h);margin-bottom:12px}
mark{background:rgba(99,102,241,0.35);color:var(--acc-txt);border-radius:2px;padding:0 2px}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;color:var(--txt-h);gap:12px;text-align:center}

@media(max-width:680px){.tab-rail{display:none}.sidebar{width:160px}.content{padding:10px 10px 40px}.st-row{display:none}.tb-desc{display:none}}

/* SETUP SECTIONS — full content, no accordion */
.setup-section-card{
  background:var(--bg-c);border:1px solid var(--brd);border-radius:10px;
  margin-bottom:14px;overflow:hidden
}
.setup-sec-hdr{
  padding:12px 16px 10px;
  border-bottom:1px solid var(--brd);
  background:linear-gradient(90deg,rgba(20,184,166,.08),transparent)
}
.setup-sec-title{
  font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px
}
.setup-sec-sub{
  font-size:11.5px;color:var(--txt-s)
}
.setup-sec-body{
  padding:14px 16px
}
.setup-sec-body p{
  font-size:12.5px;color:var(--txt-s);line-height:1.75;margin-bottom:8px
}
.setup-sec-body a{
  color:var(--acc-txt);text-decoration:none
}
.setup-sec-body a:hover{text-decoration:underline}
.setup-sec-body pre{
  font-family:var(--mono);font-size:11.5px;background:var(--bg);
  padding:14px 16px;border-radius:8px;overflow-x:auto;
  line-height:1.7;color:#e2e8f0;border:1px solid var(--brd);
  white-space:pre;margin-top:8px
}
</style>
</head>
<body>
<div class="shell">
<div class="tab-rail" id="tab-rail"></div>
<div class="sidebar">
  <div class="sb-head">
    <div class="sb-grp" id="sb-grp">Topics</div>
    <div class="sb-search-wrap">
      <span class="sb-si"><svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><path d="m15 15 4 4"/></svg></span>
      <input class="sb-input" id="sb-input" placeholder="Filter topics…" oninput="renderSidebar()"/>
    </div>
  </div>
  <div class="sb-list" id="sb-list"></div>
</div>
<div class="panel">
  <div class="topbar">
    <div class="tb-ico" id="tb-ico"></div>
    <div class="tb-info"><div class="tb-title" id="tb-title">Select a topic</div><div class="tb-desc" id="tb-desc"></div></div>
    <div class="tb-right">
      <div class="gswrap">
        <span class="gsicon"><svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><path d="m15 15 4 4"/></svg></span>
        <input class="gsearch" id="gsearch" placeholder="Global search… (Ctrl+K)" oninput="globalSearch(this.value)" onkeydown="if(event.key==='Escape')clearGS()"/>
        <button class="gsclear" id="gsclear" onclick="clearGS()">✕</button>
      </div>
      <div class="fgrp">
        <button class="fb fa on" onclick="setFilter('all')">All</button>
        <button class="fb fc" onclick="setFilter('core')">Core</button>
        <button class="fb fm" onclick="setFilter('mid')">Mid</button>
        <button class="fb fs" onclick="setFilter('senior')">Senior</button>
      </div>
      <span class="tb-stat"><b id="s-open">0</b> open</span>
      <span class="tb-stat"><b id="s-vis">0</b> shown</span>
    </div>
  </div>
  <div class="content" id="content">
    <div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".3"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <p>Select a group from the left rail, then choose a topic</p>
    </div>
  </div>
  <div class="gsearch-panel" id="gsearch-panel"></div>
</div>
</div>
<script>
/* LOGOS */
const L={

{q:'What are the main data types in Python?',l:'core',a:`<p><code>list</code> — ordered, mutable, duplicates allowed: <code>[1,'a',3.0]</code></p><p><code>tuple</code> — ordered, immutable, duplicates allowed: <code>(1,'a')</code></p><p><code>set</code> — unordered, no duplicates: <code>{1,2,3}</code></p><p><code>dict</code> — ordered (3.7+), key-value: <code>{'a':1}</code></p><p>Primitives: <code>int</code>, <code>float</code>, <code>str</code>, <code>bool</code>, <code>bytes</code>.</p>`},
{q:'Difference between list and tuple? Why is tuple faster?',l:'core',a:`<p><strong>Mutability:</strong> lists are mutable (add/remove/change). Tuples are immutable — fixed once created.</p><p><strong>Why tuple is faster:</strong> Python stores tuples compactly in memory. CPython caches small tuples. Fixed size = less allocation overhead.</p><pre>import sys
sys.getsizeof([1,2,3])   # 88 bytes
sys.getsizeof((1,2,3))   # 64 bytes</pre><p>Use tuples for fixed data (DB rows, coordinates), lists for dynamic collections.</p>`},
{q:'Difference between list and array?',l:'core',a:`<p><strong>List</strong> — built-in, accepts mixed types, flexible. General purpose.</p><p><strong>array (import array)</strong> — single type only (e.g. only ints). More memory-efficient for large numeric data. Faster for homogeneous numeric operations.</p><pre>from array import array

my_list  = [1, "hello", 3.14]    # mixed types OK</pre>`},
{q:'What is a constructor (__init__) and what is self?',l:'core',a:`<p><code>__init__</code> is a special method automatically called when an object is created. Used to initialize attributes.</p><p><code>self</code> refers to the current instance of the class — it lets instance methods access and modify the object's data.</p><pre>class Person:
    def __init__(self, name, age):
        self.name = name   # self binds attribute to THIS instance
        self.age  = age

p = Person("Smit", 25)
print(p.name)   # "Smit"</pre>`},
{q:'What are all 5 OOP concepts in Python?',l:'core',a:`<p><strong>1. Class & Object:</strong> Class = blueprint; object = instance with own state.</p><p><strong>2. Encapsulation:</strong> Bundle data + methods. Use <code>__private</code> to restrict access.</p><p><strong>3. Inheritance:</strong> Child inherits from parent. Use <code>super()</code>. Types: single, multi-level, hierarchical, multiple.</p><p><strong>4. Polymorphism:</strong> Same interface, different behaviour. Method overriding — child redefines parent method.</p><p><strong>5. Abstraction:</strong> Hide implementation via <code>ABC</code> + <code>@abstractmethod</code>.</p><pre>from abc import ABC, abstractmethod
class Shape(ABC):
    @abstractmethod
    def area(self): pass

class Circle(Shape):
    def __init__(self, r): self.r = r
    def area(self): return 3.14 * self.r ** 2</pre>`},
{q:'What is an interface in Python?',l:'mid',a:`<p>Python has no <code>interface</code> keyword. Interfaces are implemented via Abstract Base Classes (ABC) — defines a contract that all subclasses must implement.</p><pre>from abc import ABC, abstractmethod

class Shape(ABC):
    @abstractmethod
    def area(self): pass

    @abstractmethod
    def perimeter(self): pass

class Circle(Shape):
    def __init__(self, r): self.r = r
    def area(self):      return 3.14 * self.r**2
    def perimeter(self): return 2 * 3.14 * self.r</pre><p>Benefits: enforces contract, enables polymorphism, promotes decoupling.</p>`},
{q:'Difference between @classmethod, @staticmethod, @abstractmethod?',l:'mid',a:`<p><code>@classmethod</code> — receives <code>cls</code>. Factory methods, class-wide state.</p><pre>class User:
    @classmethod
    def from_dict(cls, d): return cls(d['name'], d['email'])</pre><p><code>@staticmethod</code> — no <code>self</code>/<code>cls</code>. Utility function in class namespace.</p><pre>class Validator:
    @staticmethod
    def is_email(v): return '@' in v and '.' in v</pre><p><code>@abstractmethod</code> — marks method in ABC that subclasses must implement. Instantiating ABC raises <code>TypeError</code>.</p>`},
{q:'What are Python decorators? Write one from scratch.',l:'core',a:`<p>A decorator wraps a function to extend behaviour. <code>@deco</code> is sugar for <code>fn = deco(fn)</code>. Always use <code>@functools.wraps</code>.</p><pre>import functools, time

def timer(func):
    @functools.wraps(func)
    def wrapper(*args, **kwargs):
        t = time.perf_counter()
        result = func(*args, **kwargs)
        print(f"{func.__name__}: {(time.perf_counter()-t)*1000:.1f}ms")
        return result
    return wrapper

@timer
def heavy(): time.sleep(0.5)

# Decorator with arguments:
def retry(n=3):
    def deco(func):
        @functools.wraps(func)
        def wrapper(*a, **kw):
            for i in range(n):
                try: return func(*a, **kw)
                except:
                    if i == n-1: raise
        return wrapper
    return deco</pre>`},
{q:'What is the GIL? Threading vs multiprocessing?',l:'mid',a:`<p>GIL (Global Interpreter Lock) allows only one thread to execute Python bytecode at a time in CPython. Protects reference-counting memory management.</p><p><strong>CPU-bound:</strong> GIL prevents parallelism → use <code>multiprocessing</code>.</p><p><strong>I/O-bound:</strong> GIL released while waiting for I/O → threading works.</p><pre># I/O-bound — threading
from concurrent.futures import ThreadPoolExecutor
with ThreadPoolExecutor(max_workers=10) as ex:

{q:'What are generators? Why memory-efficient?',l:'core',a:`<pre>def read_lines(path):

{q:'Nginx + Gunicorn + Supervisor explained.',l:'mid',a:`<p><strong>Nginx:</strong> Reverse proxy + static file server. Handles SSL, load balancing, forwards dynamic requests.</p><p><strong>Gunicorn:</strong> Python WSGI server. Runs Django with multiple worker processes. The bridge between Nginx and Django.</p><p><strong>Supervisor:</strong> Process manager. Keeps Gunicorn running, auto-restarts on crash, centralised logging.</p><p><strong>Flow:</strong> Client → Nginx (static files direct) → Gunicorn workers → Django → Nginx → Client.</p>`},
{q:'What is ElasticSearch and when to use over SQL?',l:'senior',a:`<p>Elasticsearch is a distributed full-text search engine using inverted indexes. Finds documents by word in milliseconds at scale.</p><p>Use when: full-text search with relevance scoring, autocomplete, fuzzy matching. SQL <code>LIKE '%term%'</code> doesn't use indexes — very slow at scale.</p><pre>es.index(index="posts", id=post.id, body={"title": post.title, "body": post.body})
results = es.search(index="posts", body={
    "query": {"multi_match": {"query": "django rest", "fields": ["title^2","body"]}}
})</pre>`},
{q:'What is the difference between @classmethod, @staticmethod, @abstractmethod in Django?',l:'mid',a:`<p>In Django models, all three Python decorators apply the same way.</p><p><code>@classmethod</code> — factory method on the class itself. Common for custom querysets.</p><pre>class Product(models.Model):
    @classmethod
    def get_active(cls):
        return cls.objects.filter(is_active=True)</pre><p><code>@staticmethod</code> — utility function with no class/instance state.</p><pre>    @staticmethod
    def is_valid_price(price): return price > 0</pre><p><code>@abstractmethod</code> — in abstract base model classes, forces subclasses to implement the method.</p>`},
]},

{q:'What are Django Class-Based Views (CBVs)?',l:'core',a:`<p>CBVs organise views using OOP — inheritance and mixins replace long function bodies. Defined in <code>django.views.generic</code>.</p><p>Key built-in CBVs:</p><ul><li><code>View</code> — base class, define get/post manually</li><li><code>TemplateView</code> — renders a template</li><li><code>ListView</code> — list of objects</li><li><code>DetailView</code> — single object</li><li><code>CreateView</code> / <code>UpdateView</code> / <code>DeleteView</code> — CRUD forms</li><li><code>FormView</code> — custom form handling</li><li><code>RedirectView</code> — simple redirect</li></ul><p>Reference: <a href="https://ccbv.co.uk" target="_blank">ccbv.co.uk</a></p>`},
{q:'How do you customise a ListView?',l:'core',a:`<pre>from django.views.generic import ListView
from .models import Post

class PostListView(ListView):
    model             = Post
    template_name     = 'posts/list.html'
    context_object_name = 'posts'    # default is 'object_list'

    def get_queryset(self):           # override to filter
        return Post.objects.filter(is_active=True)

    def get_context_data(self, **kwargs):   # add extra context
        ctx = super().get_context_data(**kwargs)
        ctx['total'] = self.get_queryset().count()
        return ctx</pre>`},
{q:'How do you customise a CreateView?',l:'core',a:`<pre>from django.views.generic.edit import CreateView

class PostCreateView(CreateView):
    model       = Post
    fields      = ['title', 'body', 'category']
    template_name = 'posts/form.html'

    def form_valid(self, form):
        form.instance.author = self.request.user  # inject user
        return super().form_valid(form)

    def get_success_url(self):    # dynamic redirect after save
        return reverse('post_detail', kwargs={'pk': self.object.pk})</pre>`},
{q:'How do you customise UpdateView and DeleteView?',l:'mid',a:`<pre>from django.views.generic.edit import UpdateView, DeleteView
from django.urls import reverse_lazy

class PostUpdateView(UpdateView):
    model   = Post
    fields  = ['title', 'body']
    template_name = 'posts/form.html'

    def form_valid(self, form):
        # custom logic before saving
        return super().form_valid(form)

class PostDeleteView(DeleteView):
    model       = Post
    template_name = 'posts/confirm_delete.html'
    success_url = reverse_lazy('post_list')

    def delete(self, request, *args, **kwargs):
        # log deletion before it happens
        return super().delete(request, *args, **kwargs)</pre>`},
{q:'What are dispatch(), get(), post() overrides in CBV?',l:'mid',a:`<pre>class CustomView(View):
    def dispatch(self, request, *args, **kwargs):
        # Runs before get/post — good for auth checks
        if not request.user.is_authenticated:
            return redirect('login')
        return super().dispatch(request, *args, **kwargs)

    def get(self, request, *args, **kwargs):
        return HttpResponse('GET response')

    def post(self, request, *args, **kwargs):
        return HttpResponse('POST response')</pre>`},
{q:'What are Archive Views (date-based) in Django CBV?',l:'senior',a:`<pre>from django.views.generic.dates import YearArchiveView

class PostYearArchiveView(YearArchiveView):

]},

{q:'DRF CBV hierarchy — APIView → GenericAPIView → ViewSet?',l:'core',a:`<p><strong>APIView</strong> — base. Write get/post/put/delete manually. Most control, most code.</p><p><strong>GenericAPIView</strong> + Mixins — adds queryset/serializer_class. Concrete generics: <code>ListCreateAPIView</code>, <code>RetrieveUpdateDestroyAPIView</code>, <code>CreateAPIView</code>, <code>ListAPIView</code>, <code>RetrieveAPIView</code>, <code>UpdateAPIView</code>, <code>DestroyAPIView</code>.</p><p><strong>ViewSet</strong> → <code>GenericViewSet</code> → <code>ModelViewSet</code> / <code>ReadOnlyModelViewSet</code>. Use with Router for auto-URLs.</p><p>Reference: <a href="https://www.cdrf.co" target="_blank">cdrf.co</a></p>`},
{q:'Field-level vs object-level validation in DRF?',l:'core',a:`<pre>class RegisterSerializer(serializers.Serializer):
    password         = serializers.CharField()
    confirm_password = serializers.CharField()

    def validate_password(self, value):        # field-level
        if len(value) < 8:
            raise serializers.ValidationError("Min 8 chars")

{q:'What is SerializerMethodField?',l:'core',a:`<pre>class UserSerializer(serializers.ModelSerializer):
    full_name  = serializers.SerializerMethodField()
    post_count = serializers.SerializerMethodField()

{q:'DRF permissions — write a custom one.',l:'mid',a:`<pre>from rest_framework.permissions import BasePermission, SAFE_METHODS

class IsOwnerOrReadOnly(BasePermission):

        return obj.owner == request.user

class PostViewSet(ModelViewSet):
    permission_classes = [IsAuthenticated, IsOwnerOrReadOnly]</pre>`},
{q:'Writable nested serializers?',l:'senior',a:`<pre>class OrderSerializer(serializers.ModelSerializer):
    items = OrderItemSerializer(many=True)

    def create(self, validated_data):
        items_data = validated_data.pop('items')
        order = Order.objects.create(**validated_data)
        for item in items_data:
            OrderItem.objects.create(order=order, **item)
        return order

    class Meta:
        model = Order; fields = ['id','total','items']

# DRF never auto-saves nested data — always override create()/update()</pre>`},

}

{q:'DRF pagination types?',l:'mid',a:`<pre>class StandardPagination(PageNumberPagination):
    page_size = 20; max_page_size = 100

{q:'Custom @action on a ViewSet?',l:'mid',a:`<pre>from rest_framework.decorators import action
from rest_framework.response import Response

class ProductViewSet(ModelViewSet):
    queryset = Product.objects.all()
    serializer_class = ProductSerializer

    @action(detail=True, methods=['post'])   # /products/1/activate/
    def activate(self, request, pk=None):

{id:'postgres',label:'PostgreSQL',lk:'postgres',desc:'Indexes, window functions, CTEs, pgvector, transactions',questions:[
{q:'DBMS vs RDBMS — difference?',l:'core',a:`<table><tr><th>DBMS</th><th>RDBMS</th></tr><tr><td>Stores data as files</td><td>Stores data in tables (rows/columns)</td></tr><tr><td>Single user typically</td><td>Multi-user support</td></tr><tr><td>May not follow ACID</td><td>Follows ACID strictly</td></tr><tr><td>No client-server architecture</td><td>Supports client-server</td></tr><tr><td>No data correlation</td><td>Tables linked via foreign keys</td></tr></table>`},
{q:'SQL vs NoSQL — difference?',l:'core',a:`<p><strong>SQL</strong> — relational, structured schema, tables + FK. Strong consistency. Best for: financial, enterprise, complex queries.</p><p><strong>NoSQL</strong> — schema-flexible (document, key-value, graph, column). Horizontal scaling. Best for: social feeds, IoT, real-time analytics, large volumes of changing data.</p>`},
{q:'DELETE vs TRUNCATE vs DROP?',l:'core',a:`<p><code>DELETE</code> — removes rows; WHERE supported; logged; rollback possible; triggers fire.</p><p><code>TRUNCATE</code> — wipes all rows; fast; resets sequences; DDL; no triggers.</p><p><code>DROP</code> — removes entire table structure + data. Irreversible.</p><pre>DELETE FROM orders WHERE status='cancelled';  -- selective
TRUNCATE TABLE sessions;    -- fast wipe all
DROP TABLE temp_imports;    -- structure gone</pre>`},
{q:'Primary key vs foreign key vs unique key?',l:'core',a:`<p><strong>PK</strong> — uniquely identifies row. Cannot be NULL. One per table. Auto-index.</p><p><strong>FK</strong> — references PK of another table. Enforces referential integrity.</p><p><strong>Unique key</strong> — all values unique. Can be NULL. Multiple per table. E.g. email, phone.</p><pre>CREATE TABLE orders (
    id      SERIAL PRIMARY KEY,
    user_id INT REFERENCES users(id) ON DELETE CASCADE,
    email   TEXT UNIQUE
);</pre>`},
{q:'Aggregate functions and WHERE vs HAVING?',l:'core',a:`<pre>SELECT department, COUNT(*) cnt, AVG(salary) avg
FROM employees
WHERE salary > 30000         -- filters rows BEFORE grouping
GROUP BY department
HAVING COUNT(*) > 5;         -- filters groups AFTER aggregation

-- Aggregate functions: COUNT, SUM, AVG, MIN, MAX</pre>`},
{q:'INNER JOIN vs LEFT JOIN vs SELF JOIN?',l:'core',a:`<pre>-- INNER JOIN — only matching rows in both
SELECT u.name, o.total FROM users u
INNER JOIN orders o ON u.id = o.user_id;

-- LEFT JOIN — all users, NULL if no order
SELECT u.name, o.total FROM users u
LEFT JOIN orders o ON u.id = o.user_id;

-- SELF JOIN — table joins itself (org chart)
SELECT e.name AS emp, m.name AS manager
FROM employees e
LEFT JOIN employees m ON e.manager_id = m.id;

-- Find same first_name, different email:
SELECT a.id, a.email, b.email FROM auth_user a
JOIN auth_user b ON a.first_name=b.first_name AND a.email!=b.email;</pre>`},
{q:'Indexes in PostgreSQL?',l:'core',a:`<pre>CREATE INDEX idx_orders_user ON orders(user_id);

-- Composite index
CREATE INDEX idx_status_date ON orders(status, created_at DESC);

-- Partial index (only rows you query)
CREATE INDEX idx_pending ON orders(created_at) WHERE status='pending';

-- Check if used:
EXPLAIN ANALYZE SELECT * FROM orders WHERE user_id=42;</pre><p>Don't over-index — every index slows INSERT/UPDATE and uses storage.</p>`},
{q:'Window Functions?',l:'mid',a:`<pre>SELECT name, department, salary,
    RANK()  OVER (PARTITION BY department ORDER BY salary DESC) AS rank,
    AVG(salary) OVER (PARTITION BY department) AS dept_avg,
    LAG(salary) OVER (PARTITION BY department ORDER BY salary) AS prev
FROM employees;

-- Running total
SELECT date, SUM(amount) OVER (ORDER BY date) AS running_total
FROM sales;</pre><p>Compute across related rows without collapsing them like GROUP BY. Common: RANK, ROW_NUMBER, DENSE_RANK, LAG, LEAD, NTILE.</p>`},
{q:'CTEs — regular and recursive?',l:'mid',a:`<pre>-- Regular CTE
WITH monthly AS (
    SELECT DATE_TRUNC('month', created_at) m, SUM(total) rev
    FROM orders GROUP BY 1
)
SELECT * FROM monthly ORDER BY rev DESC LIMIT 3;

-- Recursive CTE: category tree
WITH RECURSIVE tree AS (
    SELECT id, name, parent_id, 1 depth
    FROM categories WHERE parent_id IS NULL
    UNION ALL
    SELECT c.id, c.name, c.parent_id, t.depth+1
    FROM categories c JOIN tree t ON c.parent_id=t.id
)
SELECT * FROM tree ORDER BY depth;</pre>`},
{q:'pgvector for AI/semantic search?',l:'senior',a:`<pre>CREATE EXTENSION vector;
CREATE TABLE docs (id SERIAL, content TEXT, embedding vector(1536));

-- Cosine similarity search
SELECT content, 1-(embedding <=> '[0.1,0.2,...]'::vector) AS score
FROM docs ORDER BY embedding <=> '[0.1,0.2,...]'::vector LIMIT 5;

-- HNSW index for production speed
CREATE INDEX ON docs USING hnsw (embedding vector_cosine_ops)
WITH (m=16, ef_construction=64);</pre><p>Run semantic search directly in Postgres — no separate vector DB needed.</p>`},
{q:'PostgreSQL isolation levels?',l:'senior',a:`<p><code>READ COMMITTED</code> (default) — each statement sees latest committed.</p><p><code>REPEATABLE READ</code> — consistent snapshot for whole transaction.</p><p><code>SERIALIZABLE</code> — full isolation, prevents all anomalies.</p><pre>BEGIN;
SET TRANSACTION ISOLATION LEVEL REPEATABLE READ;
SELECT balance FROM accounts WHERE id=1;
UPDATE accounts SET balance=balance-100 WHERE id=1;
COMMIT;</pre>`},
]},
{id:'sql',label:'SQL',lk:'sql',desc:'SQL basics, joins, views, stored procedures, ACID',questions:[
{q:'What is SQL and what are its types?',l:'core',a:`<p>SQL (Structured Query Language) is the standard language for RDBMS.</p><p><strong>DDL</strong> (Data Definition): CREATE, ALTER, DROP, TRUNCATE</p><p><strong>DML</strong> (Data Manipulation): SELECT, INSERT, UPDATE, DELETE</p><p><strong>DCL</strong> (Data Control): GRANT, REVOKE</p><p><strong>TCL</strong> (Transaction Control): COMMIT, ROLLBACK, SAVEPOINT</p>`},
{q:'ACID properties?',l:'core',a:`<p><strong>Atomicity</strong> — all succeed or all rollback.</p><p><strong>Consistency</strong> — valid state before and after.</p><p><strong>Isolation</strong> — concurrent transactions don't interfere.</p><p><strong>Durability</strong> — committed data persists after crash.</p><pre>BEGIN;
  UPDATE accounts SET balance=balance-500 WHERE id=1;
  UPDATE accounts SET balance=balance+500 WHERE id=2;
COMMIT;
-- Any failure → ROLLBACK, both revert</pre>`},
{q:'View vs Stored Procedure?',l:'mid',a:`<pre>-- View — saved SELECT as virtual table
CREATE VIEW active_users AS
SELECT id, name FROM users WHERE is_active=TRUE;
SELECT * FROM active_users;

-- Function/Stored Procedure — logic + parameters + can modify data
CREATE FUNCTION get_orders(p_id INT)
RETURNS TABLE(id INT, total DECIMAL) AS $$
  SELECT id, total FROM orders WHERE user_id=p_id;
$$ LANGUAGE sql;</pre>`},
{q:'WHERE vs HAVING?',l:'core',a:`<pre>-- WHERE: filters rows BEFORE grouping
SELECT department, COUNT(*) cnt
FROM employees
WHERE salary > 50000
GROUP BY department;

-- HAVING: filters groups AFTER aggregation
SELECT department, COUNT(*) cnt
FROM employees
GROUP BY department
HAVING COUNT(*) > 5;</pre>`},
]},
]},

{id:'aws',label:'AWS Services',lk:'aws',desc:'EC2, S3, SES, SNS, SQS, IAM, VPC, Route53, RDS',questions:[
{q:'What is AWS and why is it popular?',l:'core',a:`<p>AWS (Amazon Web Services) is the world's largest cloud platform (started 2006). Pay-as-you-go model.</p><p><strong>Compute:</strong> EC2, Lambda, ECS. <strong>Storage:</strong> S3, EBS, Glacier.</p><p><strong>Database:</strong> RDS (MySQL, PostgreSQL, Oracle, MariaDB, SQL Server), DynamoDB, ElastiCache.</p><p><strong>Networking:</strong> VPC, Route 53, CloudFront, ELB. <strong>Messaging:</strong> SES, SNS, SQS.</p><p><strong>Popular because:</strong> scalability, cost-effectiveness, global infrastructure, pay-per-use.</p>`},
{q:'What is EC2 and how does it work?',l:'core',a:`<p>EC2 (Elastic Compute Cloud) = resizable virtual servers in the cloud. Launch VMs with specific CPU, memory, storage, OS.</p><p>Benefits: scalability, elasticity, cost-effectiveness, wide range of instance types, security groups.</p><p><strong>Django deployment on EC2:</strong></p><ol><li>Launch Ubuntu instance, open ports 22/80/443</li><li>SSH in: install Python, nginx, gunicorn, supervisor</li><li>Clone project, install requirements</li><li>Configure gunicorn.conf for supervisor</li><li>Configure nginx to proxy to gunicorn socket</li></ol>`},
{q:'S3 vs EBS — difference?',l:'core',a:`<p><strong>S3</strong> — object storage. Stores any file type. Accessed via internet/URL. Unlimited scale. For: images, backups, static files, datasets.</p><p><strong>EBS</strong> — block storage attached to EC2. Like a hard drive. High-performance I/O. For: databases, OS disk, application storage.</p><p>Think of S3 as Google Drive and EBS as your laptop hard drive.</p>`},
{q:'How do you send email with Amazon SES?',l:'core',a:`<pre>import boto3
ses = boto3.client('ses', region_name='us-east-1')
ses.send_email(
    Source='noreply@app.com',
    Destination={'ToAddresses':['user@example.com']},
    Message={
        'Subject':{'Data':'Welcome!'},
        'Body':{'Html':{'Data':'&lt;h1&gt;Hello!&lt;/h1&gt;'}}
    }
)
# Verify domain/email first in SES console
# Monitor: bounce &lt;0.1%, complaint &lt;0.08%</pre>`},
{q:'S3 pre-signed URLs — GET vs PUT?',l:'mid',a:`<pre>s3 = boto3.client('s3')

# GET — private file download URL
get_url = s3.generate_presigned_url('get_object',
    Params={'Bucket':'my-bucket','Key':'report.pdf'}, ExpiresIn=3600)

# PUT — user uploads DIRECT to S3 (bypasses your server!)
put_url = s3.generate_presigned_url('put_object',
    Params={'Bucket':'my-bucket','Key':f'uploads/{uuid4()}.jpg',
            'ContentType':'image/jpeg'}, ExpiresIn=300)</pre>`},
{q:'SNS vs SQS — when to use each?',l:'core',a:`<p><strong>SNS</strong> — pub/sub. One event fans out to many subscribers simultaneously (email, Lambda, SQS, HTTP). Push model, no retention.</p><p><strong>SQS</strong> — queue. Messages wait for consumer to pull and process. Persistent (14 days). Pull model.</p><p>Classic pattern: SNS → multiple SQS queues. "order_placed" → warehouse + email + analytics queues independently.</p>`},
{q:'Process SQS messages reliably in Python?',l:'mid',a:`<pre>sqs = boto3.client('sqs', region_name='us-east-1')
URL = 'https://sqs.us-east-1.amazonaws.com/123/queue'

while True:
    resp = sqs.receive_message(
        QueueUrl=URL, MaxNumberOfMessages=10,
        WaitTimeSeconds=20,   # long polling — reduces cost
        VisibilityTimeout=60) # hide from others for 60s
    for msg in resp.get('Messages', []):
        try:
            process(json.loads(msg['Body']))
            sqs.delete_message(QueueUrl=URL,
                ReceiptHandle=msg['ReceiptHandle'])
        except: pass   # returns after VisibilityTimeout
# Set Dead Letter Queue for repeated failures</pre>`},
{q:'How does Auto Scaling work in AWS?',l:'mid',a:`<p>Auto Scaling dynamically adjusts the number of EC2 instances based on traffic demand.</p><p>High traffic → adds instances (scale out). Low traffic → removes instances (scale in). Maintains availability while optimizing cost.</p><p>Configure: minimum, maximum, desired capacity + scaling policies (CPU > 70% → add instance).</p>`},
{q:'EC2 vs Elastic Beanstalk?',l:'mid',a:`<p><strong>EC2</strong> — raw virtual server. Full control, full responsibility. You manage OS, software, scaling, security.</p><p><strong>Elastic Beanstalk</strong> — PaaS on top of EC2. Upload code, it provisions servers + load balancer + auto-scaling automatically. Easier but less control.</p><p>Use EC2 for fine-grained control. Beanstalk for faster deployment with less DevOps work.</p>`},
{q:'IAM Role vs IAM User on EC2?',l:'mid',a:`<pre># IAM User = permanent keys — never put on EC2 (can leak!)
# IAM Role = temporary creds auto-rotated by metadata service

import boto3
s3 = boto3.client('s3')           # auto-fetches role creds!

{q:'Amazon VPC and Route 53?',l:'mid',a:`<p><strong>VPC</strong> — isolated private network. Control IP ranges, subnets, routing, security groups. Public subnets for web servers, private for DBs (no internet access).</p><p><strong>Route 53</strong> — AWS DNS service. Register domains, route traffic to EC2/ALB/S3, health checks, failover routing.</p>`},

# NEVER: ENV DB_PASSWORD=secret in Dockerfile (baked into image!)
# NEVER: hardcoded keys in source code</pre>`},
]},
]},

{q:'What is AI vs ML? Types of machine learning?',l:'core',a:`<p><strong>AI</strong> — machines mimicking human intelligence (problem-solving, language, pattern recognition).</p><p><strong>ML</strong> — subset of AI: systems learn from data without explicit programming.</p><p><strong>Supervised Learning</strong> — labeled data. Regression (predict number: house price), Classification (predict category: spam/not-spam).</p><p><strong>Unsupervised Learning</strong> — unlabeled. Clustering (K-means: customer segmentation), Dimensionality reduction (PCA).</p><p><strong>Reinforcement Learning</strong> — agent learns by reward/penalty. AlphaGo, self-driving cars.</p>`},
{q:'Basic steps in machine learning?',l:'core',a:`<ol><li><strong>Collect Data</strong> — gather from various sources</li><li><strong>Data Preprocessing</strong> — clean, normalize, transform</li><li><strong>Feature Engineering</strong> — extract meaningful features</li><li><strong>Model Selection</strong> — choose algorithm</li><li><strong>Training</strong> — train on training data</li><li><strong>Evaluation</strong> — test on unseen data</li><li><strong>Optimization</strong> — hyperparameter tuning</li><li><strong>Deployment</strong> — push to production</li></ol>`},
{q:'What is scikit-learn? Classification example.',l:'core',a:`<pre>from sklearn.feature_extraction.text import CountVectorizer

from sklearn.pipeline import make_pipeline

          "Invoice attached", "You won a prize", "Lunch today?"]
labels = [1, 0, 1, 0, 1, 0]   # 1=spam

model = make_pipeline(CountVectorizer(), MultinomialNB())
model.fit(emails, labels)
model.predict(["Win cash now!"])  # [1]

# Key features: classification, regression, clustering, preprocessing,
# cross-validation, grid search</pre>`},

{q:'What is LangChain with example?',l:'core',a:`<p>Open-source framework for building LLM-powered applications. Provides: model connections, prompt engineering, chains, agents, memory.</p><pre>from langchain.chat_models import ChatOpenAI
from langchain.chains import ConversationChain
from langchain.memory import ConversationBufferMemory

llm          = ChatOpenAI(temperature=0)
memory       = ConversationBufferMemory()
conversation = ConversationChain(llm=llm, memory=memory, verbose=True)

r1 = conversation.predict(input="Hi, I'm Smit!")
r2 = conversation.predict(input="What's my name?")
print(r2)   # Remembers "Smit"</pre>`},
{q:'What is Hugging Face and tokenizers?',l:'mid',a:`<p>"GitHub of ML" — pretrained models, datasets, Spaces. <code>transformers</code> library.</p><p>Tokenizer converts text → token IDs the model understands. Each model has its own vocabulary.</p><pre>from transformers import pipeline, AutoTokenizer

clf = pipeline("sentiment-analysis")
clf("I love building AI apps!")
# [{'label':'POSITIVE','score':0.9998}]

tok = AutoTokenizer.from_pretrained("bert-base-uncased")
tok("Hello world!")
# {'input_ids':[101,7592,2088,102]}</pre><p>Supports: NLP, computer vision, audio, multimodal tasks.</p>`},
{q:'PyTorch vs TensorFlow?',l:'mid',a:`<table><tr><th>Aspect</th><th>PyTorch</th><th>TensorFlow</th></tr><tr><td>Graph</td><td>Dynamic (eager by default)</td><td>Originally static, now eager too</td></tr><tr><td>Debug</td><td>Standard Python tools</td><td>Harder with static graph</td></tr><tr><td>Research</td><td>Dominant in academia</td><td>Less common for research</td></tr><tr><td>Deployment</td><td>TorchScript, ONNX</td><td>TF Serving, TFLite, TF.js (more mature)</td></tr><tr><td>Visualisation</td><td>TensorBoardX (secondary)</td><td>Built-in TensorBoard</td></tr></table>`},
{q:'What is Matplotlib?',l:'core',a:`<p>Popular Python library for creating static, interactive, and animated data visualisations.</p><pre>import matplotlib.pyplot as plt
import numpy as np

X = np.array([1, 2, 3, 4, 5]).reshape(-1, 1)
y = np.array([2, 4, 5, 4, 5])

plt.scatter(X, y, color='blue')    # actual data
plt.plot(X, y_pred, color='red')   # model prediction
plt.xlabel('X'); plt.ylabel('y')
plt.title('Linear Regression')
plt.show()</pre><p>Supports: line, scatter, bar, histogram, pie, 3D plots.</p>`},
{q:'Foundation model vs fine-tuning vs RAG?',l:'core',a:`<p><strong>Foundation model</strong> — large pretrained (GPT-4, Claude, Llama). General knowledge, no private data.</p><p><strong>Fine-tuning</strong> — train further on your data. Changes style/behaviour. Expensive, hard to update.</p><p><strong>RAG</strong> — retrieve context at inference, inject into prompt. Fresh, easy to update, auditable. Preferred for production.</p><p>Decision order: prompting → RAG → fine-tuning.</p>`},
{q:'Prompt engineering techniques?',l:'core',a:`<p><strong>Zero-shot:</strong> just describe the task.</p><p><strong>Few-shot:</strong> provide 2–5 input→output examples.</p><p><strong>Chain-of-thought:</strong> "Think step by step." Improves reasoning.</p><p><strong>System prompt:</strong> persona, constraints, output format.</p><p><strong>Structured output:</strong> request JSON with schema. Parse with Pydantic.</p><p><strong>ReAct:</strong> Reason + Act loop — think → tool → observe → think.</p>`},
{q:'What are AI agents?',l:'mid',a:`<p><strong>Simple LLM call:</strong> input → output. One step.</p><p><strong>Agent:</strong> LLM + tools + loop. Reasons → calls tool → observes result → repeats until done.</p><p>Needs: tool definitions, execution loop (ReAct/LangGraph), stopping condition, memory.</p><p>Risks: infinite loops, prompt injection via tool results. Always set max_iterations.</p>`},
]},

{q:'Memory types in LangChain?',l:'mid',a:`<p><code>ConversationBufferMemory</code> — all messages verbatim. Grows until context fills.</p><p><code>ConversationBufferWindowMemory(k=10)</code> — last k turns. Good balance.</p><p><code>ConversationSummaryMemory</code> — LLM compresses old history. Handles long sessions.</p><p>For production agents: use LangGraph TypedDict state — more explicit and debuggable.</p>`},
]},
{id:'langgraph',label:'LangGraph',lk:'langgraph',desc:'StateGraph, nodes, edges, supervisor, checkpointer',questions:[
{q:'LangGraph vs LangChain chain?',l:'core',a:`<p>LangGraph = directed graph with optional cycles. Chains = linear DAG (no loops).</p><p>Graphs support: loops (retry/re-plan), branching, multi-agent coordination. Each node = Python function receiving state, returning partial update. Cycles enable ReAct loops.</p>`},
{q:'StateGraph and state flow?',l:'core',a:`<pre>from typing import TypedDict, Annotated
import operator

class AgentState(TypedDict):
    messages: Annotated[list, operator.add]  # append not replace
    next: str

def agent(state: AgentState) -> dict:
    reply = llm.invoke(state["messages"])
    return {"messages":[reply], "next":"tool" if reply.tool_calls else "end"}

builder = StateGraph(AgentState)
builder.add_node("agent", agent)
builder.set_entry_point("agent")
graph = builder.compile()</pre>`},
{q:'Conditional edges and supervisor pattern?',l:'mid',a:`<pre>def route(state):
    last = state["messages"][-1]
    return "tools" if (hasattr(last,'tool_calls') and last.tool_calls) else "__end__"

builder.add_conditional_edges("agent", route, {"tools":"tools","__end__":END})
builder.add_edge("tools","agent")   # loop back

# Supervisor pattern:
def supervisor(state):
    resp = llm.invoke([SystemMessage(
        "Manage: researcher, coder. Who next? Or FINISH."
    )] + state["messages"])
    return {"next": resp.content.strip()}

builder.add_conditional_edges("supervisor",
    lambda s: s["next"], {"researcher":"researcher","FINISH":END})</pre>`},
{q:'Checkpointer and human-in-the-loop?',l:'senior',a:`<pre>memory = SqliteSaver.from_conn_string(":memory:")
graph  = builder.compile(checkpointer=memory,
                          interrupt_before=["risky_action"])
config = {"configurable":{"thread_id":"user-123"}}

graph.invoke({"messages":[HumanMessage("Delete test users")]}, config)
snapshot = graph.get_state(config)
print("About to:", snapshot.next)   # inspect first
graph.invoke(None, config)          # resume</pre>`},
]},

{id:'react',label:'React',lk:'react',desc:'Hooks, state, routing, performance, patterns',questions:[
{q:'What is React and its key features?',l:'core',a:`<p>Open-source JS library for building UIs (Facebook). Component-based — small reusable pieces.</p><p><strong>Virtual DOM:</strong> in-memory DOM. On state change, diffs old vs new, applies minimal real DOM updates → fast.</p><p><strong>One-way data flow:</strong> parent → child via props. Predictable state.</p><p><strong>JSX:</strong> HTML-like syntax in JS, compiled by Babel.</p><p><strong>SPA-friendly:</strong> React Router syncs URL with component tree without page reloads.</p>`},
{q:'State vs props? Stateful vs stateless components?',l:'core',a:`<p><strong>Props</strong> — read-only, passed from parent. Immutable from child.</p><p><strong>State</strong> — internal mutable data. Change triggers re-render.</p><p><strong>Stateful component</strong> — manages its own state with hooks. For interactive features, forms, data fetching.</p><p><strong>Stateless/presentational</strong> — receives data via props only, purely renders UI. Easier to test and reuse.</p><pre>function Greeting({ name }) { return &lt;h1&gt;Hi {name}&lt;/h1&gt; }  // stateless
function Counter() {                                           // stateful
  const [count, setCount] = useState(0)
  return &lt;button onClick={()=>setCount(c=>c+1)}&gt;{count}&lt;/button&gt;
}</pre>`},
{q:'useState vs useReducer?',l:'core',a:`<pre>// useState — simple values
const [name, setName] = useState('')

// useReducer — complex state, multiple related updates
const reducer = (state, action) => {
  switch(action.type) {
    case 'SET_USER':    return {...state, user:action.payload}
    case 'SET_LOADING': return {...state, loading:action.payload}
    case 'RESET':       return initialState
    default: return state
  }
}
const [state, dispatch] = useReducer(reducer, {user:null, loading:false})
dispatch({type:'SET_LOADING', payload:true})</pre>`},
{q:'useEffect and dependency rules?',l:'core',a:`<pre>useEffect(() => {
  const sub = subscribe(userId)
  return () => sub.unsubscribe()   // cleanup on unmount / before re-run
}, [userId])                        // dependency array

// []       → once on mount only
// [a, b]   → when a or b changes
// no array → after EVERY render (usually a bug!)</pre><p>List every reactive value in deps. ESLint <code>eslint-plugin-react-hooks</code> enforces this.</p>`},
{q:'useMemo and useCallback?',l:'mid',a:`<pre>// useMemo — memoize expensive computed value
const filtered = useMemo(
  () => items.filter(i => i.active && i.score > threshold),
  [items, threshold])

// useCallback — stable function reference
const handleSubmit = useCallback(async (data) => {
  await api.post('/submit', data)
}, [])   // no deps = always same reference</pre><p>Don't add everywhere — overhead cost. Use when: memoized children need stable refs, or computation is measurably slow.</p>`},
{q:'React Context — when NOT to use?',l:'mid',a:`<pre>const ThemeCtx = createContext('light')
function App() {
  const [theme, setTheme] = useState('light')
  return (
    &lt;ThemeCtx.Provider value={{theme, setTheme}}&gt;
      &lt;DeepChild /&gt;
    &lt;/ThemeCtx.Provider&gt;
  )
}
const {theme} = useContext(ThemeCtx)  // any depth, no drilling</pre><p><strong>Don't use for high-frequency state</strong> — every consumer re-renders on every value change. Use Zustand/Jotai for frequent updates.</p>`},
{q:'React Query (TanStack Query)?',l:'mid',a:`<pre>const {data, isLoading} = useQuery({
  queryKey: ['user', userId],
  queryFn:  () => api.getUser(userId),
  staleTime: 5 * 60 * 1000
})
const qc = useQueryClient()
const update = useMutation({
  mutationFn: d => api.updateUser(userId, d),
  onSuccess:  () => qc.invalidateQueries(['user',userId])
})</pre><p>Caching, background refetch, deduplication, optimistic updates — replaces ~200 lines of useEffect.</p>`},
{q:'React Router?',l:'core',a:`<pre>import {BrowserRouter, Routes, Route, Link, useParams} from 'react-router-dom'

function App() {
  return (
    &lt;BrowserRouter&gt;
      &lt;nav&gt;&lt;Link to="/posts"&gt;Posts&lt;/Link&gt;&lt;/nav&gt;
      &lt;Routes&gt;
        &lt;Route path="/"          element={&lt;Home/&gt;}/&gt;
        &lt;Route path="/posts"     element={&lt;PostList/&gt;}/&gt;
        &lt;Route path="/posts/:id" element={&lt;PostDetail/&gt;}/&gt;
      &lt;/Routes&gt;
    &lt;/BrowserRouter&gt;
  )
}
function PostDetail() {
  const {id} = useParams(); return &lt;div&gt;Post #{id}&lt;/div&gt;
}</pre>`},
{q:'All React Hooks?',l:'core',a:`<p><strong>Basic:</strong> <code>useState</code>, <code>useEffect</code>, <code>useContext</code>.</p><p><strong>Additional:</strong> <code>useReducer</code>, <code>useMemo</code>, <code>useCallback</code>, <code>useRef</code> (DOM ref / mutable value), <code>useLayoutEffect</code>, <code>useImperativeHandle</code>, <code>useDebugValue</code>.</p><p><strong>React 18+:</strong> <code>useTransition</code>, <code>useDeferredValue</code>, <code>useId</code>.</p><p><strong>Custom hooks:</strong> function starting with "use" that calls other hooks. Encapsulate reusable stateful logic.</p>`},
{q:'Virtual DOM and reconciliation?',l:'core',a:`<p>VDOM = lightweight JS object mirroring real DOM. On state change, React diffs old vs new VDOM, applies minimal real DOM updates.</p><p>Reconciliation: different element type → rebuild. Same type → update attributes. Lists → use <code>key</code> prop (never use array index as key for dynamic lists).</p>`},
{q:'HOC and React Fragments?',l:'mid',a:`<pre>// HOC — wraps component to add behaviour
function withAuth(Component) {
  return function Protected(props) {
    const {user} = useAuth()
    if (!user) return &lt;Navigate to="/login"/&gt;
    return &lt;Component {...props}/&gt;
  }
}

// Fragment — group without extra DOM node
return &lt;&gt;&lt;Header/&gt;&lt;Main/&gt;&lt;Footer/&gt;&lt;/&gt;

// Strict Mode — highlights potential problems in development
// &lt;React.StrictMode&gt; wraps your app</pre>`},
{q:'Lifecycle in React (class components)?',l:'mid',a:`<p><strong>Mounting:</strong> constructor → render → componentDidMount</p><p><strong>Updating:</strong> render → componentDidUpdate</p><p><strong>Unmounting:</strong> componentWillUnmount</p><p>In functional components with hooks: <code>useEffect</code> replaces all lifecycle methods.</p><pre>// Equivalent to componentDidMount:
useEffect(() => { /* setup */ }, [])
// Equivalent to componentWillUnmount:
useEffect(() => { return () => { /* cleanup */ } }, [])
// Equivalent to componentDidUpdate for 'count':
useEffect(() => { /* runs when count changes */ }, [count])</pre>`},
{q:'Code splitting and lazy loading?',l:'mid',a:`<pre>const Dashboard = lazy(() => import('./pages/Dashboard'))
const Settings  = lazy(() => import('./pages/Settings'))

function App() {
  return (
    &lt;Suspense fallback={&lt;PageSkeleton/&gt;}&gt;
      &lt;Routes&gt;
        &lt;Route path="/dashboard" element={&lt;Dashboard/&gt;}/&gt;
      &lt;/Routes&gt;
    &lt;/Suspense&gt;
  )
}</pre><p>Each page = separate JS chunk, loaded only when navigated to. Reduces initial bundle size → faster first load.</p>`},
]},
{id:'javascript',label:'JavaScript',lk:'javascript',desc:'ES6+, closures, async, Promise, event loop',questions:[
{q:'var vs let vs const?',l:'core',a:`<p><code>var</code> — function-scoped, hoisted, redeclarable. Avoid in modern JS.</p><p><code>let</code> — block-scoped, hoisted (TDZ), reassignable, not redeclarable.</p><p><code>const</code> — block-scoped, must initialize, immutable binding (object contents still mutable).</p><pre>if (true) {
  var x = 1    // leaks to function scope!
  let y = 2    // block-scoped
  const z = 3  // block-scoped, immutable binding
}
console.log(x)  // 1 — leaked!
console.log(y)  // ReferenceError</pre><p>Best practice: <code>const</code> by default, <code>let</code> to reassign, never <code>var</code>.</p>`},
{q:'Arrow functions vs regular functions?',l:'core',a:`<p><code>this</code>: arrow inherits from enclosing scope; regular has own <code>this</code> based on call site.</p><p><code>arguments</code>: arrow has none.</p><p><code>new</code>: arrow cannot be constructor.</p><pre>const obj = {
  name: "Smit",
  regular() { console.log(this.name) },   // "Smit"
  arrow: () => console.log(this.name)     // undefined (outer this)
}
[1,2,3].map(x => x*2)  // arrow preferred for callbacks</pre>`},
{q:'Promise vs async/await?',l:'mid',a:`<pre>// Promise — .then().catch() chaining
fetch('/api').then(r=>r.json()).then(console.log).catch(console.error)

// async/await — same, cleaner, easier to debug
async function getData() {
  try { return await (await fetch('/api')).json() }
  catch(e) { console.error(e) }
}

// Concurrent requests:
const [user, posts] = await Promise.all([getUser(), getPosts()])

// Promise states: pending → fulfilled OR rejected (irreversible)</pre>`},
{q:'What is a closure?',l:'mid',a:`<pre>function makeCounter(start=0) {
  let count = start    // captured in closure
  return {
    inc: () => ++count,
    dec: () => --count,
    val: () => count,
  }
}
const c = makeCounter(10)
c.inc()  // 11 — count is private, only accessible via methods</pre><p>Closure = function remembers variables from outer scope after outer function returns. Enables: data privacy, factory functions.</p>`},
{q:'JavaScript event loop?',l:'mid',a:`<pre>console.log('1')
setTimeout(() => console.log('3'), 0)        // macro task queue
Promise.resolve().then(() => console.log('2')) // microtask queue
console.log('4')
// Output: 1, 4, 2, 3
// Microtasks (Promises) drain BEFORE macro tasks (setTimeout)</pre><p>Single-threaded. Event loop: Call Stack → Web APIs → Microtask/Task Queue → Call Stack.</p>`},
{q:'Synchronous vs asynchronous in JavaScript?',l:'core',a:`<pre>// Sync — blocks thread
function heavyCalc() { /* CPU blocking loop */ }

// Async — non-blocking, event loop handles it
async function loadData() {
  const data = await fetch('/api')  // yields to event loop
  return data.json()
}</pre><p>JS is single-threaded. Async lets it handle many concurrent I/O operations via the event loop without blocking.</p>`},
]},
]},
{id:'devops',label:'DevOps',lk:'docker',topics:[
{id:'docker',label:'Docker',lk:'docker',desc:'Images, Compose, multi-stage builds, secrets, production',questions:[
{q:'What is Docker?',l:'core',a:`<p>Containerisation platform — packages code + runtime + libraries + config into a portable unit running identically everywhere.</p><p>Solves: "works on my machine", dependency conflicts, slow VM-based deployment.</p><p><strong>Image</strong> — immutable layered blueprint (Dockerfile). <strong>Container</strong> — running instance. <strong>Docker Hub</strong> — image registry.</p>`},
{q:'Multi-stage Docker build?',l:'mid',a:`<pre>FROM python:3.12 AS builder
WORKDIR /build
COPY requirements.txt .
RUN pip install --user --no-cache-dir -r requirements.txt

FROM python:3.12-slim AS runtime
WORKDIR /app
COPY --from=builder /root/.local /root/.local
COPY . .
ENV PATH=/root/.local/bin:$PATH
RUN adduser --disabled-password app
USER app
CMD ["gunicorn","myapp.wsgi","--bind","0.0.0.0:8000"]</pre><p>Builder ~1.4GB → Runtime ~180MB. Smaller = faster pulls, smaller attack surface, no build tools in prod.</p>`},
{q:'Docker Compose — Django + Postgres + Redis?',l:'core',a:`<pre>services:
  web:
    build: .; ports:["8000:8000"]; env_file:.env
    depends_on:
      db: {condition:service_healthy}
  db:
    image:postgres:16-alpine
    environment:{POSTGRES_PASSWORD:secret,POSTGRES_DB:myapp}
    volumes:[pg_data:/var/lib/postgresql/data]
    healthcheck:
      test:["CMD","pg_isready","-U","postgres"]
      interval:5s; retries:5
  redis:

/* ===== INTERACTIONS ===== */
function selectGroup(gid, setupMode){
  isSetupMode=!!setupMode;
  activeGid=gid;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.gid===gid));
  const groups=isSetupMode?SETUP_GROUPS:GROUPS;
  const g=groups.find(x=>x.id===gid);
  if(g?.topics?.length){ activeTid=g.topics[0].id; }
  renderSidebar();
  renderContent();
}

function selectTopic(tid){
  activeTid=tid;
  document.querySelectorAll('.tp-btn').forEach(b=>b.classList.toggle('active',b.dataset.tid===tid));
  renderContent();
}

function toggleCard(key){
  const c=document.querySelector(`[data-key="${key}"]`);
  if(!c)return;
  if(c.classList.contains('open')){c.classList.remove('open');openSet.delete(key);}
  else{c.classList.add('open');openSet.add(key);}
  updateStats();
}

function toggleStep(key){
  const c=document.querySelector(`[data-key="${key}"]`);
  if(!c)return;
  c.classList.toggle('open');
  updateStats();
}

function expandAll(){
  document.querySelectorAll('#q-list .q-card').forEach(c=>{
    if(c.style.display!=='none'){c.classList.add('open');openSet.add(c.dataset.key);}
  });
  document.querySelectorAll('.step-card').forEach(c=>c.classList.add('open'));
  updateStats();
}

function collapseAll(){
  document.querySelectorAll('#q-list .q-card').forEach(c=>{c.classList.remove('open');openSet.delete(c.dataset.key);});
  document.querySelectorAll('.step-card').forEach(c=>c.classList.remove('open'));
  updateStats();
}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  const m={all:'fa',core:'fc',mid:'fm',senior:'fs'};
  document.querySelector('.'+m[f])?.classList.add('on');
  applyFilter();
}

function applyFilter(){
  let vis=0;
  document.querySelectorAll('#q-list .q-card').forEach(c=>{
    const show=filter==='all'||c.dataset.level===filter;
    c.style.display=show?'':'none';
    if(show)vis++;
  });
  const steps=document.querySelectorAll('#step-list .step-card').length;
  document.getElementById('s-vis').textContent=vis+steps;
  updateStats();
}

function updateStats(){
  const open=document.querySelectorAll('.q-card.open,.step-card.open').length;
  document.getElementById('s-open').textContent=open;
}

/* ===== GLOBAL SEARCH ===== */
function globalSearch(query){
  const q=query.trim().toLowerCase();
  const panel=document.getElementById('gsearch-panel');
  const content=document.getElementById('content');
  const clear=document.getElementById('gsclear');

  if(!q){
    panel.classList.remove('show');
    content.style.display='';
    clear.classList.remove('show');
    return;
  }
  clear.classList.add('show');
  panel.classList.add('show');
  content.style.display='none';

  const results=[];
  [...GROUPS,...SETUP_GROUPS].forEach(g=>{
    g.topics.forEach(tp=>{
      (tp.questions||[]).forEach(question=>{
        if(question.q.toLowerCase().includes(q)||question.a.toLowerCase().includes(q)){
          results.push({group:g.label, topic:tp.label, topicId:tp.id, groupId:g.id, q:question});
        }
      });
    });
  });

  if(!results.length){
    panel.innerHTML=`<div class="gs-empty">No results for "<strong>${escHtml(query)}</strong>"</div>`;
    return;
  }

  const hl=txt=>{
    if(!q)return escHtml(txt);
    const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return escHtml(txt).replace(re,'<mark>$1</mark>');
  };
  const stripHtml=h=>h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,200);

  panel.innerHTML=`<div class="gs-count">${results.length} result${results.length!==1?'s':''} for "<strong>${escHtml(query)}</strong>"</div>`
    +results.map(r=>`
    <div class="gs-result">
      <div class="gs-r-hdr">
        <span>${r.group}</span>
        <span>›</span>
        <span class="gs-topic">${r.topic}</span>
        <span class="badge ${r.q.l==='senior'?'bs':r.q.l==='mid'?'bm':'bc'}" style="margin-left:auto">${r.q.l}</span>
      </div>
      <div class="gs-r-body">
        <div class="gs-r-q" onclick="goToQuestion('${r.groupId}','${r.topicId}')">${hl(r.q.q)}</div>
        <div class="gs-r-ans">${hl(stripHtml(r.q.a))}</div>
      </div>
    </div>`).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function goToQuestion(gid,tid){
  clearGS();
  const isSetup = SETUP_GROUPS.some(g=>g.id===gid);
  selectGroup(gid, isSetup);
  selectTopic(tid);
}

function clearGS(){
  document.getElementById('gsearch').value='';
  document.getElementById('gsclear').classList.remove('show');
  document.getElementById('gsearch-panel').classList.remove('show');
  document.getElementById('content').style.display='';
}

// Ctrl+K shortcut
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){
    e.preventDefault();
    document.getElementById('gsearch').focus();
  }
});

/* ===== INIT ===== */
renderSidebar();
renderContent();
</script>
</body>
</html>
